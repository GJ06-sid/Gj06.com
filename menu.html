<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="GJ 06 Menu — Hand-brewed chai, fresh-baked breads, and magical bites." />
  <title>Menu — GJ 06</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

<div class="page-transition"></div>

<!-- Custom cursor -->
<div class="cursor" aria-hidden="true">
  <svg viewBox="0 0 36 36" fill="none">
    <rect x="8" y="16" width="20" height="14" rx="2" fill="#0a0a0a"/>
    <path d="M28 20 Q34 20 34 25 Q34 30 28 30" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
    <path d="M14 14 Q13 10 14 7 Q15 4 14 1" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" class="steam-line"/>
    <path d="M20 14 Q19 10 20 7 Q21 4 20 1" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" class="steam-line"/>
    <ellipse cx="18" cy="30" rx="13" ry="3" fill="#0a0a0a"/>
  </svg>
</div>

<!-- Nav Overlay -->
<div id="navOverlay" class="nav-menu-overlay">
  <button id="navClose" style="position:absolute;top:24px;right:24px;background:none;border:none;font-size:42px;color:white;font-family:'Caveat',cursive;">✕</button>
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="index.html#about">Our Story</a>
    <a href="index.html#gallery">Gallery</a>
    <a href="reserve.html">Reserve</a>
  </nav>
  <div class="menu-social">
    <a href="https://instagram.com" target="_blank" rel="noopener">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
    </a>
  </div>
</div>

<!-- Navbar -->
<header id="navbar" style="position:fixed;top:0;left:0;right:0;z-index:400;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:white;border-bottom:2.5px solid var(--black);transition:box-shadow 0.3s;">
  <a href="index.html" style="display:flex;align-items:center;gap:10px;">
    <img src="assets/logo.png" alt="GJ 06" style="height:42px;width:auto;" onerror="this.style.display='none'">
    <span style="font-family:var(--font-display);font-size:26px;letter-spacing:0.05em;">GJ 06</span>
  </a>
  <button id="hamburger" aria-label="Open menu" aria-expanded="false" style="background:none;border:3px solid var(--black);border-radius:var(--radius-sketch);width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px;">
    <span style="display:block;width:22px;height:2.5px;background:var(--black);border-radius:2px;"></span>
    <span style="display:block;width:16px;height:2.5px;background:var(--black);border-radius:2px;align-self:flex-start;"></span>
    <span style="display:block;width:22px;height:2.5px;background:var(--black);border-radius:2px;"></span>
  </button>
</header>
<style>#navbar.scrolled{box-shadow:0 4px 0 var(--black);}</style>

<!-- Page Header -->
<section style="padding-top:calc(var(--nav-h) + 48px);padding-bottom:40px;padding-left:20px;padding-right:20px;background:var(--black);text-align:center;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background-image:radial-gradient(circle,#333 1px,transparent 1px);background-size:24px 24px;opacity:0.4;"></div>
  <div style="position:relative;z-index:2;">
    <div style="font-family:var(--font-hand);font-size:18px;color:white;opacity:0.5;margin-bottom:8px;">— everything we make —</div>
    <h1 class="display-xl" style="color:white;">MENU</h1>
    <p style="font-family:var(--font-hand);font-size:18px;color:white;opacity:0.7;margin-top:12px;">Fresh. Flat. Flavourful.</p>
  </div>
</section>

<!-- Wavy divider -->
<div style="background:var(--black);line-height:0;">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none" style="display:block;width:100%;">
    <path d="M0,20 Q180,0 360,20 Q540,40 720,20 Q900,0 1080,20 Q1260,40 1440,20 L1440,40 L0,40 Z" fill="white"/>
  </svg>
</div>

<!-- Category Tabs -->
<div style="position:sticky;top:var(--nav-h);z-index:300;background:white;border-bottom:2.5px solid var(--black);overflow-x:auto;scrollbar-width:none;">
  <div style="display:flex;min-width:max-content;padding:0 12px;">
    <button class="cat-tab active" data-cat="all" style="font-family:var(--font-display);font-size:18px;letter-spacing:0.05em;padding:14px 20px;border:none;background:none;border-bottom:4px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s;">ALL</button>
    <button class="cat-tab" data-cat="hot-drinks" style="font-family:var(--font-display);font-size:18px;letter-spacing:0.05em;padding:14px 20px;border:none;background:none;border-bottom:4px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s;">☕ HOT DRINKS</button>
    <button class="cat-tab" data-cat="cold-drinks" style="font-family:var(--font-display);font-size:18px;letter-spacing:0.05em;padding:14px 20px;border:none;background:none;border-bottom:4px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s;">🧋 COLD SIPS</button>
    <button class="cat-tab" data-cat="breads" style="font-family:var(--font-display);font-size:18px;letter-spacing:0.05em;padding:14px 20px;border:none;background:none;border-bottom:4px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s;">🍞 BAKEHOUSE</button>
    <button class="cat-tab" data-cat="bites" style="font-family:var(--font-display);font-size:18px;letter-spacing:0.05em;padding:14px 20px;border:none;background:none;border-bottom:4px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s;">✨ LIL BITES</button>
  </div>
</div>

<style>
  .cat-tab.active { border-bottom-color: var(--black) !important; }
  .cat-tab:hover { background: var(--grey-light); }
</style>

<!-- Menu Content -->
<main style="padding:40px 20px 120px;max-width:960px;margin:0 auto;" id="menuContent">
  <!-- Populated by JS -->
  <div style="text-align:center;padding:60px 20px;font-family:var(--font-hand);font-size:20px;opacity:0.4;" id="menuLoading">
    Brewing the menu... ☕
  </div>
</main>

<!-- Mobile Order Bar -->
<div class="mobile-order-bar">
  <a href="reserve.html" class="btn" style="background:white;color:var(--black);border-color:white;font-size:16px;">Reserve Table</a>
  <a href="#menuContent" class="btn btn-outline" style="border-color:white;color:white;font-size:16px;">↑ Top</a>
</div>

<script src="js/main.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
